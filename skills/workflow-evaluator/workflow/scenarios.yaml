name: workflow-evaluator-scenarios
version: "1.0.0"
goal: Define required evaluation scenario suite.
steps:
  - id: happy-path
    description: Verify completed status with no retries.
    gate: happy-passed
  - id: retry-path
    description: Verify retry handling and recovery.
    gate: retry-passed
  - id: governance-path
    description: Verify escalation path and failure status.
    gate: governance-passed
