name: workflow-evaluator-flow
version: "1.0.0"
goal: Ensure workflow evaluation runs scenarios, quality gates, and scorecard output.
steps:
  - id: discovery-pass
    description: Discover runnable commands and triggers.
    gate: command-inventory-ready
  - id: scenario-pass
    description: Execute happy, retry, and governance/failure scenarios.
    gate: scenarios-complete
  - id: validation-pass
    description: Run typecheck, lint, and test gates.
    gate: quality-gates-complete
  - id: scorecard
    description: Produce final ease scorecard artifact.
    gate: scorecard-complete
