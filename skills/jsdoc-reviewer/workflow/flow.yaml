name: jsdoc-reviewer-flow
version: "1.0.0"
goal: Audit and optionally patch exported API JSDoc contracts.
steps:
  - id: scope-lock
    description: Confirm scope and expected review mode.
    gate: scope-locked
  - id: export-inventory
    description: Build deterministic exported API inventory.
    gate: inventory-ready
  - id: contract-audit
    description: Evaluate each export against contract requirements.
    gate: findings-ready
  - id: patch-pass
    description: Patch JSDoc contracts when fixes are requested.
    gate: patch-complete
  - id: validation-pass
    description: Run lint and typecheck for changed files.
    gate: validation-complete
