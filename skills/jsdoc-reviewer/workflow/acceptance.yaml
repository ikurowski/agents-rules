name: jsdoc-reviewer-acceptance
version: "1.0.0"
goal: Acceptance criteria for JSDoc reviewer runs.
steps:
  - id: findings-with-paths
    description: Findings include severity and file references.
    gate: findings-format-valid
  - id: required-fields-covered
    description: Required contract fields checked for each export in scope.
    gate: contract-coverage-valid
  - id: validation-recorded
    description: Validation commands and outcomes are reported.
    gate: validation-evidence-valid
